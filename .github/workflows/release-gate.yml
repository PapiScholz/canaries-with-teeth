name: Release Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run E2E canaries
        run: node e2e/run-canaries.cjs

      - name: Export CANARY_PASSED
        run: |
          cat canary-status.env >> $GITHUB_ENV

      - name: Validate contracts
        run: node contract-validation.test.js

      - name: Run release gate
        id: release_gate
        run: node src/gating/run-release-gate.ts

      - name: Upload gating artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gating-artifacts
          path: artifacts/gating/
